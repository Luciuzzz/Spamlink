# =========================================================
#  Spamlink - Configuracion de despliegue en Render
#  Render detecta este archivo (Blueprint) y crea el servicio web
#  junto con una base de datos PostgreSQL gestionada.
# =========================================================

databases:
  - name: spamlink-db
    databaseName: spamlink
    user: spamlink
    plan: free

services:
  - type: web
    name: spamlink
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    branch: main
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: Spamlink
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      # Render genera una clave; tambien podes fijar la tuya con: php artisan key:generate --show
      - key: APP_KEY
        sync: false
      # URL publica del servicio. OJO: `fromService` solo expone la direccion
      # PRIVADA (host:port, ej. spamlink:10000), no la URL https publica, asi que
      # se deja como secreto para cargarla en el dashboard tras el primer deploy:
      #   APP_URL=https://spamlink.onrender.com   (usar la URL real que asigne Render)
      - key: APP_URL
        sync: false

      # ----- Conexion a la base PostgreSQL gestionada por Render -----
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: spamlink-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: spamlink-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: spamlink-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: spamlink-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: spamlink-db
          property: password

      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stderr
      # Cloudflare Turnstile desactivado por defecto (no depende de script externo).
      # Para activarlo: poner TURNSTILE_ENABLED=true y claves reales de Cloudflare.
      - key: TURNSTILE_ENABLED
        value: "false"
      - key: TURNSTILE_SITE_KEY
        value: "1x00000000000000000000AA"
      - key: TURNSTILE_SECRET_KEY
        value: "1x0000000000000000000000000000000AA"
