# Apache vhost para Spamlink (Laravel + Filament)
# Escucha en el puerto que inyecta la plataforma ($PORT) o 8080 por defecto.
ServerName localhost

<VirtualHost *:${PORT}>
    DocumentRoot /var/www/html/public

    # Apache trae por defecto "Alias /icons/ /usr/share/apache2/icons/".
    # Lo anulamos para que /icons/ apunte a los íconos de la aplicación.
    Alias /icons /var/www/html/public/icons

    <Directory /var/www/html/public>
        Options Indexes FollowSymLinks
        # Permite que el .htaccess de Laravel maneje el rewrite a index.php
        # y deja que Apache sirva los archivos estáticos existentes.
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
