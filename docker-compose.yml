# =========================================================
#  Spamlink - docker-compose
#  Levanta dos servicios: la app (Laravel + Filament) y PostgreSQL.
#  Uso:
#    docker compose build
#    docker compose up -d
#  App disponible en: http://localhost:8080
# =========================================================
services:

  # ---------- Base de datos PostgreSQL ----------
  db:
    image: postgres:16
    container_name: spamlink-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: spamlink
      POSTGRES_USER: spamlink
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"          # opcional: conectar un cliente externo (DBeaver, etc.)
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spamlink -d spamlink"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------- Aplicación Laravel + Filament ----------
  app:
    build: .
    image: spamlink
    container_name: spamlink-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: Spamlink
      APP_ENV: production
      APP_DEBUG: "false"
      # Conexión a la base PostgreSQL del servicio "db"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: spamlink
      DB_USERNAME: spamlink
      DB_PASSWORD: secret
      # Drivers que viven en la base (no en archivos)
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    ports:
      - "8080:8080"
    volumes:
      # Persistir los archivos subidos (imágenes de la landing)
      - app_storage:/var/www/html/storage/app/public

volumes:
  db_data:
  app_storage:
